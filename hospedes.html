<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Paraíso - HOSPEDES</title>
    <link rel="icon" type="image/png" href="images/logo-hotel-paraiso.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/imask"></script>
    <script src="js/script.js"></script>
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="images/logo-hotel-paraiso.png" alt="Logo Hotel">
        </div>

        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="quartos.html">Quartos</a>
            <a href="hospedes.html">Hospedes</a>
            <a href="localizacao.html">Localização</a>
            <a href="galeria.html">Galeria</a>
            <a href="reservas.html">Reservas</a>
        </nav>
    </header>

    <section class="topic">
      
      

        <a href="reservas.html" class="topic-button">
            Faça sua reserva
        </a>
    </section>

    <section class="main">
<img src="images/logo-hotel-paraiso.png" alt="">
        <h2>Hospedes</h2>

        <div class="gallery">

            <form action="">
                
                <div class="card">
                    
                    <div class="logo">
                       
                    </div><br>

                    <div class="form-group">
                        <label>Nome Completo:</label>
                        <input type="text" placeholder="Digite aqui" maxlength="200" required>
                    </div>

                    <div class="form-group">
                        <label>CPF:</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>

                    <div class="form-group">
                        <label>RG:</label>
                        <input type="text" id="rg" placeholder="00000000-0" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label>Telefone:</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>

                    <div class="form-group">
                        <label>E-Mail:</label>
                        <input type="email" placeholder="seuemail@operadora.com" required>
                    </div>

                    <div class="form-group">
                        <label>Data Nascimento:</label>
                        <input type="date" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label>Cidade:</label>
                        <input type="text" placeholder="Digite aqui" maxlength="50" required>
                    </div>

                    <div class="form-group">
                        <label>Estado:</label>
                        <input type="text" placeholder="Digite aqui" maxlength="50" required>
                    </div>

                    <div class="form-group">
                        <label>País:</label>
                        <input type="text" placeholder="Digite aqui" maxlength="50" required>
                    </div>

                    <div class="form-group">
                        <label>Número De Acompanhantes:</label>
                        <input type="number" placeholder="Digite aqui" min="0" required>
                    </div>

                    <div class="form-group full">
                        <label>Observações Especiais:</label>
                        <textarea name="observacoes" required></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" onclick="cadastroHospedesOk(event)">Cadastrar</button>
                        <button type="reset" class="btn-secondary">Limpar</button>
                    </div>

                </div>
            </form>

        </div>

    </section>

</body>

</html>
